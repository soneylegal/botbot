name: Deploy botbot to Azure

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

concurrency:
  group: azure-prod-deploy
  cancel-in-progress: false

env:
  AZURE_ENV_NAME: prod
  AZURE_LOCATION: francecentral

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup AZD
        uses: azure/setup-azd@v2

      - name: Prepare azd environment
        shell: bash
        env:
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail
          azd version
          azd env new "${AZURE_ENV_NAME}" --no-prompt || true
          azd env set AZURE_LOCATION "${AZURE_LOCATION}"
          azd env set AZURE_SUBSCRIPTION_ID "${AZURE_SUBSCRIPTION_ID}"
          azd env set AZURE_RESOURCE_GROUP "rg-${AZURE_ENV_NAME}"
          azd env set POSTGRES_ADMIN_PASSWORD "${POSTGRES_ADMIN_PASSWORD}"
          azd env set JWT_SECRET_KEY "${JWT_SECRET_KEY}"

      - name: Validate infrastructure changes
        shell: bash
        run: |
          set -euo pipefail
          azd provision --preview --no-prompt

      - name: Deploy application
        shell: bash
        run: |
          set -euo pipefail
          azd up --no-prompt

      - name: Verify health endpoint
        shell: bash
        run: |
          set -euo pipefail
          eval "$(azd env get-values --environment "${AZURE_ENV_NAME}")"
          RESOURCE_GROUP="${AZURE_RESOURCE_GROUP:-rg-${AZURE_ENV_NAME}}"
          APP_NAME="$(az containerapp list -g "${RESOURCE_GROUP}" --query "[0].name" -o tsv)"
          FQDN="$(az containerapp show -g "${RESOURCE_GROUP}" -n "${APP_NAME}" --query "properties.configuration.ingress.fqdn" -o tsv)"

          for i in {1..20}; do
            if curl -fsS "https://${FQDN}/health"; then
              echo "Health check passed"
              exit 0
            fi
            echo "Waiting for app readiness... attempt ${i}"
            sleep 10
          done

          echo "Health check failed after retries"
          exit 1
